<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CupX Corporation | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            /* Liquid Glass / Glassmorphism Colors */
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Subtle radial gradient background common in liquid UI */
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 60%);
            background-attachment: fixed;
        }

        /* --- Header (CupX.in Style) --- */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-logo img {
            height: 24px;
            width: auto;
        }

        .hamburger {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: var(--text-primary);
            border-radius: 2px;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            padding-top: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 0 16px;
        }

        /* --- Banner & Profile (Liquid Glass UI) --- */
        .banner-container {
            width: 100%;
            height: 160px;
            border-radius: 20px; /* Rounded edges for banner */
            overflow: hidden;
            position: relative;
            /* Glass effect behind banner just in case */
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .banner {
            width: 100%;
            height: 100%;
            background-image: url('banner.png'); /* Ensure banner.png exists */
            background-size: cover;
            background-position: center;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -50px;
            margin-bottom: 30px;
            text-align: center;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--bg-color); /* Matches background to cut into banner */
            background-color: #fff;
            object-fit: cover;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .brand-info {
            margin-top: 15px;
        }

        .brand-info h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand-info p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 6px;
        }

        /* --- Social Icons --- */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-icon {
            fill: var(--text-primary);
            width: 24px;
            height: 24px;
            transition: transform 0.2s, fill 0.2s;
        }

        .social-icon:hover {
            transform: scale(1.1);
            fill: var(--accent-blue);
        }

        /* --- Links Section (Liquid Glass UI) --- */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }

        .link-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            
            padding: 16px 20px;
            border-radius: 16px; /* Liquid rounded corners */
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Glass Shine Effect on Hover */
        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-20deg);
            transition: left 0.5s ease;
        }

        .link-card:hover {
            transform: translateY(-3px);
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .link-card:hover::before {
            left: 200%;
        }

        .icon-box {
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--glass-highlight);
            border-radius: 10px;
            border: 1px solid var(--glass-border);
        }

        .svg-icon {
            width: 18px;
            height: 18px;
            fill: var(--accent-blue);
        }
        
        .star-icon {
            fill: #fbbf24; /* Yellow for reviews */
        }

        /* --- Footer (CupX.in Style) --- */
        .site-footer {
            padding: 30px 20px;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--text-primary);
        }
    </style>
</head>
