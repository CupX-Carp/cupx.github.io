<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CupX Corporation | Bio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-color);
            position: relative;
        }

        /* Header Section */
        .banner {
            width: 100%;
            height: 160px;
            background-image: url('banner.png');
            background-size: cover;
            background-position: center;
        }

        .profile-section {
            padding: 0 16px;
            margin-top: -45px;
            margin-bottom: 20px;
        }

        .logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid var(--bg-color);
            background-color: #fff;
            object-fit: cover;
        }

        .brand-info {
            margin-top: 10px;
        }

        .brand-info h1 {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .brand-info p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        /* Social Icons */
        .social-row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .social-icon {
            fill: var(--text-primary);
            width: 24px;
            height: 24px;
            transition: opacity 0.2s;
        }

        .social-icon:hover {
            opacity: 0.7;
        }

        /* Links Section */
        .links-container {
            padding: 0 16px 40px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .link-card:hover {
            transform: translateY(-2px);
            background: #2d3a4f;
        }

        .icon-box {
            margin-right: 15px;
            display: flex;
            align-items: center;
        }

        .mail-svg {
            width: 20px;
            height: 20px;
            fill: var(--accent-blue);
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>
