<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calculator | CupX Corporation</title>

  <meta name="description" content="Simple and clean calculator built by CupX Corporation." />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header (same as Tools page) */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: #020617;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 14px;
    }

    header a:hover {
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
    }

    .calculator {
      width: 100%;
      max-width: 320px;
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    }

    .display {
      width: 100%;
      height: 55px;
      margin-bottom: 15px;
      padding: 10px;
      font-size: 22px;
      text-align: right;
      border: none;
      border-radius: 6px;
      background: #020617;
      color: #ffffff;
      box-sizing: border-box;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 48px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #1e293b;
      color: #ffffff;
      transition: opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
    }

    .operator {
      background: #334155;
    }

    .equal {
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
    }

    .clear {
      background: #ef4444;
      font-weight: bold;
    }

    .back {
      background: #475569;
    }

    .wide {
      grid-column: span 2;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      background-color: #020617;
      opacity: 0.8;
      margin-top: auto;
    }
  </style>
</head>

<body>

<header>
  <h1>CupX Calculator</h1>
  <a href="/tools/">← Back to Tools</a>
</header>

<main>
  <div class="calculator">

    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
      <button class="clear wide" onclick="clearDisplay()">C</button>
      <button class="back" onclick="backspace()">⌫</button>
      <button class="operator" onclick="add('/')">÷</button>

      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button class="operator" onclick="add('*')">×</button>

      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>
      <button class="operator" onclick="add('-')">−</button>

      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>
      <button class="operator" onclick="add('+')">+</button>

      <button class="wide" onclick="add('0')">0</button>
      <button onclick="add('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>

  </div>
</main>

<footer>
  © 2026 CupX Corporation · All rights reserved
</footer>

<script>
  const display = document.getElementById("display");

  function add(value) {
    display.value += value;
  }

  function clearDisplay() {
    display.value = "";
  }

  function backspace() {
    display.value = display.value.slice(0, -1);
  }

  function calculate() {
    try {
      display.value = eval(display.value);
    } catch {
      display.value = "Error";
    }
  }
</script>

</body>
</html>
