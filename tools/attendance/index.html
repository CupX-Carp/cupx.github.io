<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Attendance System | CupX Corporation</title>

<meta name="description" content="Simple attendance record system built by CupX Corporation." />

<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #0f172a;
  color: #e5e7eb;
}

main {
  max-width: 1000px;
  margin: auto;
  padding: 60px 20px;
}

h2 {
  text-align: center;
  font-size: 32px;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  margin-bottom: 40px;
  opacity: 0.8;
}

.form-box {
  background-color: #020617;
  padding: 25px;
  border-radius: 10px;
  margin-bottom: 25px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: none;
  font-size: 14px;
}

button {
  background: #38bdf8;
  color: #020617;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.action-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.action-row button {
  flex: 1;
}

table {
  width: 100%;
  border-collapse: collapse;
  background-color: #020617;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  font-size: 14px;
}

.present { color: #22c55e; font-weight: bold; }
.absent { color: #ef4444; font-weight: bold; }
</style>
</head>

<body>

<main>

<h2>Attendance System</h2>
<p class="subtitle">Simple attendance record tool by CupX Corporation</p>

<div class="form-box">
  <input type="text" id="sessionName" placeholder="Attendance Session Name (e.g. B.Tech CSE Section A)">
  <input type="text" id="name" placeholder="Student Name">
  <input type="text" id="roll" placeholder="Roll Number">

  <select id="status">
    <option value="Present">Present</option>
    <option value="Absent">Absent</option>
  </select>

  <button onclick="addAttendance()">Add Record</button>
</div>

<div class="action-row">
  <button onclick="exportExcel()">Export Excel</button>
  <button onclick="exportPDF()">Export PDF</button>
  <button onclick="clearAll()">Clear All</button>
</div>

<table>
  <thead>
    <tr>
      <th>Sr. No</th>
      <th>Name</th>
      <th>Roll</th>
      <th>Status</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="records"></tbody>
</table>

</main>

<script>

let records = JSON.parse(localStorage.getItem("attendance")) || [];

function render() {
  const table = document.getElementById("records");
  table.innerHTML = "";

  records.forEach((r, index) => {
    table.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${escapeHTML(r.name)}</td>
        <td>${escapeHTML(r.roll)}</td>
        <td class="${r.status === 'Present' ? 'present' : 'absent'}">${r.status}</td>
        <td>${r.date}</td>
      </tr>
    `;
  });
}

function addAttendance() {
  const name = nameInput.value.trim();
  const roll = rollInput.value.trim();
  const status = statusInput.value;

  if (!name || !roll) {
    alert("Please fill all fields");
    return;
  }

  records.push({
    name,
    roll,
    status,
    date: new Date().toLocaleDateString()
  });

  localStorage.setItem("attendance", JSON.stringify(records));

  nameInput.value = "";
  rollInput.value = "";
  nameInput.focus();

  render();
}

function clearAll() {
  if (confirm("Delete all records?")) {
    records = [];
    localStorage.removeItem("attendance");
    render();
  }
}

/* ENTER KEY FLOW */
const nameInput = document.getElementById("name");
const rollInput = document.getElementById("roll");
const statusInput = document.getElementById("status");

nameInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    rollInput.focus();
  }
});

rollInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    statusInput.focus();
    statusInput.click();
  }
});

statusInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    addAttendance();
  }
});

/* EXCEL EXPORT */
function exportExcel() {
  if (records.length === 0) {
    alert("No data to export.");
    return;
  }

  const sessionName = document.getElementById("sessionName").value || "Attendance Record";

  const wsData = [];

  wsData.push(["CupX Attendance System"]);
  wsData.push([sessionName]);
  wsData.push(["Sr No", "Name", "Roll No", "Status", "Date"]);

  records.forEach((r, i) => {
    wsData.push([i+1, r.name, r.roll, r.status, r.date]);
  });

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  ws["!merges"] = [
    { s:{r:0,c:0}, e:{r:0,c:4} },
    { s:{r:1,c:0}, e:{r:1,c:4} }
  ];

  /* Auto column width ignoring first 2 rows */
  const colWidths = [5, 15, 12, 10, 12];

  ws["!cols"] = colWidths.map(w => ({ wch: w }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Attendance");

  XLSX.writeFile(wb, "cupx-attendance.xlsx");
}

/* PDF EXPORT */
function exportPDF() {
  if (records.length === 0) {
    alert("No data to export.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const sessionName = document.getElementById("sessionName").value || "Attendance Record";

  const primaryBlue = [56, 189, 248]; // CupX blue
  const darkBlue = [2, 6, 23];

  const totalPagesExp = "{total_pages_count_string}";

  const drawHeader = (data) => {
    doc.setFont("helvetica", "bold");

    // Main Title
    doc.setFontSize(18);
    doc.setTextColor(...primaryBlue);
    doc.text("CupX Attendance System", doc.internal.pageSize.getWidth() / 2, 15, {
      align: "center"
    });

    // Session Name
    doc.setFontSize(13);
    doc.text(sessionName, doc.internal.pageSize.getWidth() / 2, 23, {
      align: "center"
    });

    // Page number
    doc.setFontSize(9);
    doc.setTextColor(120);
    doc.text(
      "Page " + doc.internal.getNumberOfPages(),
      doc.internal.pageSize.getWidth() - 20,
      doc.internal.pageSize.getHeight() - 10
    );
  };

  const tableData = records.map((r, i) => [
    i + 1,
    r.name,
    r.roll,
    r.status,
    r.date
  ]);

  doc.autoTable({
    head: [["Sr No", "Name", "Roll", "Status", "Date"]],
    body: tableData,
    startY: 30,
    theme: "grid",
    styles: {
      fontSize: 10,
      cellPadding: 3
    },
    headStyles: {
      fillColor: primaryBlue,
      textColor: 255,
      halign: "center",
      fontStyle: "bold"
    },
    columnStyles: {
      0: { halign: "center" },
      2: { halign: "center" },
      3: { halign: "center" },
      4: { halign: "center" }
    },
    didParseCell: function (data) {
      if (data.section === "body" && data.column.index === 3) {
        if (data.cell.raw === "Present") {
          data.cell.styles.textColor = [34, 197, 94]; // green
          data.cell.styles.fontStyle = "bold";
        } else {
          data.cell.styles.textColor = [239, 68, 68]; // red
          data.cell.styles.fontStyle = "bold";
        }
      }
    },
    didDrawPage: function (data) {
      drawHeader(data);
    }
  });

  doc.save("cupx-attendance.pdf");
}
function escapeHTML(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

render();

</script>

</body>
</html>
